<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALOCAÇÃO DE TRABALHADORES</title>
<!--
  ============================================================================
  ALOCAÇÃO DE TRABALHADORES — SER.RA — versão ligada ao Supabase (nuvem)
  ============================================================================
  1) SUPABASE: supabase.com > SQL Editor > corre o script de criação das
     tabelas (ver guia enviado no chat) > Settings > API > cola o Project URL
     e a chave "anon public" nas variáveis SUPABASE_URL / SUPABASE_ANON_KEY
     logo a seguir a <script>.
  2) ALOJAMENTO: GitHub > repositório > ficheiro "index.html" > Settings >
     Pages > activar. Ou arrasta para app.netlify.com/drop.
  ============================================================================
-->
<style>
  :root{
    --paper:#EFEDE6; --surface:#FFFFFF; --ink:#23262B; --ink-soft:#6B6F76;
    --line:#DBD6C9; --navy:#333333; --navy-ink:#1A1A1A; --amber:#4A4A4A;
    --c1:#4F8B5B; --c2:#D9A441; --c3:#C1554A; --c4:#4C7EA8; --c5:#2B2B2B;
    --weekend:#E4E0D4;
    --radius:10px;
    font-family:Tahoma,Geneva,Verdana,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);}
  #app{max-width:1400px;margin:0 auto;padding:0 0 60px;}

  .topbar{background:var(--navy);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:40;}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .brand{display:flex;flex-direction:column;line-height:1.1;}
  .brand .eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#B0B0B0;font-weight:700;}
  .brand h1{font-size:19px;margin:2px 0 0;font-weight:800;letter-spacing:.01em;}
  .btn{border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.02em;}
  .btn-export{background:var(--amber);color:#FFFFFF;}
  .btn-export:disabled{opacity:.5;cursor:default;}
  .btn-manage{background:rgba(255,255,255,.14);color:#fff;}

  .periodbar{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 16px;background:var(--surface);
             border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .mode-toggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .mode-toggle button{border:none;background:#fff;color:var(--ink-soft);padding:7px 14px;font-size:12px;font-weight:700;
                       cursor:pointer;font-family:inherit;}
  .mode-toggle button.active{background:var(--navy);color:#fff;}
  .nav-group{display:flex;align-items:center;gap:12px;}
  .nav-group button{background:none;border:1px solid var(--line);border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:15px;color:var(--navy);}
  .nav-group .label{font-weight:800;font-size:13.5px;letter-spacing:.02em;text-transform:capitalize;min-width:170px;text-align:center;}

  .legend{display:flex;gap:14px;flex-wrap:wrap;padding:12px 20px 0;font-size:11px;color:var(--ink-soft);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block;}

  .grid-wrap{overflow:auto;margin:12px 20px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);
             max-height:60vh;}
  table.grid{border-collapse:separate;border-spacing:0;font-size:12px;}
  table.grid th,table.grid td{padding:0;}
  /* Coluna de trabalhadores: largura única e fixa, sempre — mensal, semanal, qualquer ecrã ou rotação. */
  .worker-col{position:sticky;left:0;z-index:5;background:var(--surface);text-align:left;padding:9px 12px !important;
              font-weight:700;font-size:12.5px;border-right:2px solid var(--line);white-space:nowrap;
              width:104px;min-width:104px;max-width:104px;}
  thead .worker-col{z-index:15;background:var(--navy);color:#fff;}
  thead tr th{position:sticky;top:0;background:var(--navy);color:#fff;z-index:10;border-bottom:1px solid rgba(255,255,255,.15);}
  .daycol{width:50px;text-align:center;padding:6px 2px !important;font-weight:700;font-size:10.5px;}
  .daycol .dow{display:block;font-weight:500;font-size:8.5px;color:#B5B5B5;text-transform:uppercase;}
  .daycol.weekend{background:#202020;}
  td.daycell{text-align:center;border-right:1px solid #EEEBE3;border-bottom:1px solid #EEEBE3;padding:3px !important;}
  td.daycell.weekend{background:var(--weekend);}
  tr:nth-child(even) .worker-col{background:#FAF9F5;}
  tr:nth-child(even) td.daycell:not(.weekend){background:#FCFBF8;}

  .cell-btn{width:44px;min-height:30px;border-radius:6px;border:1.5px solid #D6D6D6;background:#fff;cursor:pointer;
            display:flex;flex-direction:column;overflow:hidden;padding:0;transition:transform .08s ease;}
  .cell-btn:active{transform:scale(.94);}
  .cell-half{flex:1 1 50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;
             font-size:6.6px;letter-spacing:.01em;padding:1px 0;line-height:1.05;}
  .cell-half.empty{color:#B0B0B0;background:#fff;font-size:9px;}
  .s-1DIA{background:var(--c1);} .s-MEIODIA{background:var(--c2);} .s-FALTA{background:var(--c3);}
  .s-FERIAS{background:var(--c4);} .s-EXTRA{background:var(--c5);}
  .cell-btn.conflict{border-color:#1A1A1A;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(26,26,26,.5);}50%{box-shadow:0 0 0 4px rgba(26,26,26,0);}}

  /* vista semanal: os "meios-dias" ficam lado a lado em vez de empilhados (não afecta largura) */
  table.grid.week .cell-btn{flex-direction:row;border-radius:7px;}
  table.grid.week .cell-half{font-size:8px;}
  table.grid.week .cell-half.empty{font-size:11px;}

  /* Modo "fill": aplicado via JS quando há espaço real (ecrã largo OU telemóvel em horizontal) —
     as colunas dos dias esticam para preencher tudo, sem scroll. Sem esta classe, mantém-se o
     scroll lateral com largura mínima tocável — a coluna de trabalhadores nunca muda em nenhum caso. */
  table.grid.fill{width:100%;table-layout:fixed;}
  table.grid.fill .daycol{width:auto;}
  table.grid.fill .cell-btn{width:100%;}

  .summary-wrap{margin:20px 20px 0;}
  .summary-wrap h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:0 0 8px;}
  .summary-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
  .scard{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
  .scard .name{font-weight:700;font-size:12.5px;margin-bottom:6px;}
  .scard .name .sub{font-weight:500;color:var(--ink-soft);font-size:10.5px;}
  .scard .row{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);}
  .scard .row b{color:var(--ink);font-weight:700;}
  .scard .row.tot{margin-top:4px;padding-top:4px;border-top:1px dashed var(--line);font-weight:800;color:var(--navy-ink);}
  .scard .breakdown{margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);}
  .scard .breakdown .row{padding:1px 0;}
  .scard .empty-hint{font-size:11px;color:#B0B0B0;font-style:italic;}

  .overlay{position:fixed;inset:0;background:rgba(20,20,18,.45);display:none;align-items:flex-end;justify-content:center;z-index:100;}
  .overlay.open{display:flex;}
  .sheet{background:var(--surface);width:100%;max-width:440px;max-height:88vh;overflow-y:auto;border-radius:16px 16px 0 0;
         padding:18px 18px 22px;box-shadow:0 -6px 24px rgba(0,0,0,.2);}
  .sheet .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
  .sheet .who{font-weight:800;font-size:15px;}
  .sheet .when{font-size:12px;color:var(--ink-soft);}

  .entries-list{margin:12px 0;display:flex;flex-direction:column;gap:6px;}
  .entry-row{display:flex;align-items:center;justify-content:space-between;background:#F5F4F0;border:1px solid var(--line);
             border-radius:8px;padding:8px 10px;font-size:12px;}
  .entry-row .tag{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;}
  .entry-row .rm{border:none;background:none;color:#9A9A9A;font-weight:800;cursor:pointer;font-size:14px;padding:0 4px;}
  .entry-row .rm:hover{color:#1A1A1A;}
  .no-entries{font-size:12px;color:#B0B0B0;font-style:italic;margin:10px 0;}

  .field-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:14px 0 6px;font-weight:700;}
  .obra-pills{display:flex;gap:6px;flex-wrap:wrap;}
  .obra-pill{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:7px 12px;font-size:11.5px;
             font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink);}
  .obra-pill.selected{background:var(--navy);border-color:var(--navy);color:#fff;}

  .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .opt{border:none;border-radius:10px;padding:14px 8px;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;}
  .opt:active{transform:scale(.97);}
  .opt.o-1DIA{background:var(--c1);} .opt.o-MEIODIA{background:var(--c2);}
  .opt.o-FALTA{background:var(--c3);} .opt.o-FERIAS{background:var(--c4);}
  .opt.o-EXTRA{background:var(--c5);grid-column:1 / span 2;}
  .opt:disabled{opacity:.32;cursor:not-allowed;}
  .sheet-warn{background:#EDEDED;border:1px solid #D0D0D0;color:#333;border-radius:8px;padding:8px 10px;font-size:11.5px;
              margin-top:10px;display:none;}
  .sheet-warn.show{display:block;}
  .opt-clear{margin-top:14px;width:100%;background:none;border:1.5px solid var(--line);border-radius:10px;
             padding:11px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit;}

  .manage-sheet{max-width:520px;}
  .manage-sheet h4{margin:16px 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);}
  .manage-note{font-size:11.5px;color:var(--ink-soft);margin:4px 0 0;}
  .manage-list{display:flex;flex-direction:column;gap:6px;}
  .manage-item{display:flex;align-items:center;justify-content:space-between;background:#F5F4F0;border:1px solid var(--line);
               border-radius:8px;padding:8px 10px;font-size:12.5px;}
  .manage-item .rm{border:none;background:none;color:#9A9A9A;font-weight:800;cursor:pointer;font-size:14px;padding:0 4px;}
  .manage-add{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .manage-add input{flex:1 1 120px;border:1px solid var(--line);border-radius:6px;padding:8px 9px;font-size:12.5px;font-family:inherit;}
  .btn-add{background:var(--navy);color:#fff;flex:0 0 auto;}

  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--navy-ink);color:#fff;
         padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:600;opacity:0;pointer-events:none;
         transition:opacity .25s;z-index:200;max-width:88vw;text-align:center;}
  .toast.show{opacity:1;}

  .config-banner{display:none;background:#1A1A1A;color:#fff;padding:12px 20px;font-size:13px;font-weight:600;text-align:center;}
  .config-banner.show{display:block;}
  .config-banner code{background:rgba(255,255,255,.18);padding:1px 5px;border-radius:4px;}
</style>
</head>
<body>

<div id="app">
  <div class="config-banner" id="configBanner"></div>

  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <span class="eyebrow">SER.RA · Construção</span>
        <h1>ALOCAÇÃO DE TRABALHADORES</h1>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-manage" id="manageBtn">Gerir obras/trabalhadores</button>
        <button class="btn btn-export" id="exportBtn">Exportar para Excel</button>
      </div>
    </div>
  </div>

  <div class="periodbar">
    <div class="mode-toggle">
      <button id="modeWeek" class="active">Semanal</button>
      <button id="modeMonth">Mensal</button>
    </div>
    <div class="nav-group">
      <button id="prevBtn">‹</button>
      <div class="label" id="periodLabel">—</div>
      <button id="nextBtn">›</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="hd"><span class="who" id="sheetWho">—</span><span class="when" id="sheetWhen">—</span></div>

    <div class="field-label">Já marcado neste dia</div>
    <div class="entries-list" id="entriesList"></div>

    <div class="field-label">Obra (não é preciso para Falta/Férias)</div>
    <div class="obra-pills" id="obraPills"></div>

    <div class="field-label">Estado</div>
    <div class="opt-grid">
      <button class="opt o-1DIA" data-k="1DIA">1 DIA</button>
      <button class="opt o-MEIODIA" data-k="MEIODIA">1/2 DIA</button>
      <button class="opt o-FALTA" data-k="FALTA">FALTA</button>
      <button class="opt o-FERIAS" data-k="FERIAS">FÉRIAS</button>
      <button class="opt o-EXTRA" data-k="EXTRA">DIA EXTRA</button>
    </div>
    <div class="sheet-warn" id="sheetWarn"></div>

    <button class="opt-clear" id="closeSheetBtn">Fechar</button>
  </div>
</div>

<div class="overlay" id="manageOverlay">
  <div class="sheet manage-sheet">
    <div class="hd"><span class="who">Gerir obras e trabalhadores</span></div>
    <p class="manage-note">Remover só tira da lista activa — não apaga presenças já registadas.</p>

    <h4>Obras</h4>
    <div id="obraList" class="manage-list"></div>
    <div class="manage-add">
      <input id="newObraCode" placeholder="Código (ex: P24-09)" />
      <input id="newObraName" placeholder="Nome da obra" />
      <button id="addObraBtn" class="btn btn-add">Adicionar obra</button>
    </div>

    <h4>Trabalhadores</h4>
    <div id="workerList" class="manage-list"></div>
    <div class="manage-add">
      <input id="newWorkerName" placeholder="Nome do trabalhador" />
      <button id="addWorkerBtn" class="btn btn-add">Adicionar trabalhador</button>
    </div>

    <button class="opt-clear" id="closeManageBtn" style="margin-top:16px;">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  "use strict";

  // ============================================================
  // 1) CONFIGURAÇÃO DO SUPABASE
  // ============================================================
  var SUPABASE_URL = "https://ysuukjbejadpgdzbotgj.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzdXVramJlamFkcGdkemJvdGdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDc4NDIsImV4cCI6MjA5OTE4Mzg0Mn0.eiuoQdFUulpV7uhJ89Zd5BMsUW6qX2q1vnxAhHUUDHU";

  var sb = null, sbReady = false;
  var isFileProtocol = (location.protocol === "file:");
  try{
    if(SUPABASE_URL.indexOf("COLA_AQUI") === -1){
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      sbReady = true;
    }
  }catch(e){ sbReady = false; }

  if(isFileProtocol){
    var fb = document.getElementById("configBanner");
    fb.innerHTML = "⚠️ Estás a abrir o ficheiro directamente (file://) — a internet fica bloqueada neste modo. " +
      "Abre pelo link publicado (ex: https://oteunome.github.io/...).";
    fb.classList.add("show");
  } else if(!sbReady){
    document.getElementById("configBanner").classList.add("show");
  }

  var WORKERS = ["ANTÓNIO","BERNADO","CAPUCHO","DANIEL","DANILO","DANNY","GIOVANNI","MBALA","PATRICK","SULEIMANE"];
  var OBRAS = [
    {code:"OB26-02", name:"Moradia Vigias da Arriba — Obras de Conservação"},
    {code:"OB25-01", name:"Estúdio Pilates Mafra"},
    {code:"COL21-03", name:"Moradia São João — Estoril"},
    {code:"P22-03", name:"Ampliação Casal de Cambra"},
    {code:"P23-06", name:"Casa na Mofina"},
    {code:"P24-04", name:"Pinhal da Praia 2.0"},
    {code:"P23-07", name:"Prédio Marques Lésbio"}
  ];
  var STATUS = {
    "1DIA":   {label:"1 DIA",   abbr:"1D", cls:"s-1DIA"},
    "MEIODIA":{label:"1/2 DIA", abbr:"½",  cls:"s-MEIODIA"},
    "FALTA":  {label:"FALTA",   abbr:"F",  cls:"s-FALTA"},
    "FERIAS": {label:"FÉRIAS",  abbr:"Fé", cls:"s-FERIAS"},
    "EXTRA":  {label:"DIA EXTRA", abbr:"Ex", cls:"s-EXTRA"}
  };
  var STATUS_ORDER = ["1DIA","MEIODIA","FALTA","FERIAS","EXTRA"];
  var STATUS_COLOR_VAR = {"1DIA":"--c1","MEIODIA":"--c2","FALTA":"--c3","FERIAS":"--c4","EXTRA":"--c5"};
  function blockingStatus(st){ return st==="1DIA"||st==="FALTA"||st==="FERIAS"||st==="EXTRA"; }
  function emptyCounts(){ return {"1DIA":0,"MEIODIA":0,"FALTA":0,"FERIAS":0,"EXTRA":0}; }

  var MONTH_NAMES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  var MONTH_ABBR = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  var DOW = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  // ---------- datas / período ----------
  var periodMode = "week"; // "month" | "week" — semanal por defeito
  var anchorDate = new Date();
  anchorDate.setHours(0,0,0,0);

  function ymKey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
  function dayKeyOf(d){ return String(d.getDate()); }
  function isWeekend(d){ var w=d.getDay(); return w===0||w===6; }
  function mondayOf(d){
    var x = new Date(d); var day = x.getDay(); var diff = (day===0 ? -6 : 1-day);
    x.setDate(x.getDate()+diff); x.setHours(0,0,0,0); return x;
  }
  function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function getDatesForMonth(y,m){
    var nd = new Date(y,m+1,0).getDate(); var arr=[];
    for(var i=1;i<=nd;i++) arr.push(new Date(y,m,i));
    return arr;
  }
  function getDatesForWeek(monday){
    var arr=[]; for(var i=0;i<7;i++) arr.push(addDays(monday,i)); return arr;
  }
  function currentDates(){
    return periodMode==="month" ? getDatesForMonth(anchorDate.getFullYear(), anchorDate.getMonth()) : getDatesForWeek(mondayOf(anchorDate));
  }
  function periodLabel(){
    if(periodMode==="month") return MONTH_NAMES[anchorDate.getMonth()]+" "+anchorDate.getFullYear();
    var dates = getDatesForWeek(mondayOf(anchorDate));
    var a=dates[0], b=dates[6];
    return a.getDate()+" "+MONTH_ABBR[a.getMonth()]+" – "+b.getDate()+" "+MONTH_ABBR[b.getMonth()]+" "+b.getFullYear();
  }

  var cache = {}; // ymKey -> {worker:{day:[{obra,status},...]}}
  var pendingWorker = null, pendingDate = null, pendingObra = null;
  var lastObra = null;
  try{ lastObra = localStorage.getItem("lastObra"); }catch(e){ lastObra = null; }
  function setLastObra(code){
    lastObra = code;
    try{ localStorage.setItem("lastObra", code); }catch(e){ /* ignora se não disponível */ }
  }

  function showToast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function(){ t.classList.remove("show"); }, 2200);
  }

  // ---------- acesso a dados ----------
  async function loadConfig(){
    if(!sbReady) return;
    try{
      var res = await sb.from("config").select("data").eq("key","settings").maybeSingle();
      if(res.error) throw res.error;
      if(res.data && res.data.data){
        var d = res.data.data;
        if(Array.isArray(d.workers) && d.workers.length) WORKERS = d.workers;
        if(Array.isArray(d.obras) && d.obras.length) OBRAS = d.obras;
      } else { await saveConfig(); }
    }catch(e){ /* mantém valores por omissão */ }
  }
  async function saveConfig(){
    if(!sbReady) return;
    try{
      var res = await sb.from("config").upsert({key:"settings", data:{workers:WORKERS, obras:OBRAS}});
      if(res.error) throw res.error;
    }catch(e){ console.error(e); showToast("Erro ao guardar configuração: "+(e&&e.message?e.message:"")); }
  }

  async function ensureMonthsLoaded(dates){
    var yms = {};
    dates.forEach(function(d){ yms[ymKey(d)] = true; });
    var keys = Object.keys(yms);
    for(var i=0;i<keys.length;i++){
      var ym = keys[i];
      if(cache[ym]) continue;
      if(!sbReady){ cache[ym] = {}; continue; }
      try{
        var res = await sb.from("presencas").select("data").eq("key",ym).maybeSingle();
        if(res.error) throw res.error;
        cache[ym] = (res.data && res.data.data) ? res.data.data : {};
      }catch(e){
        cache[ym] = {};
        console.error("Erro ao ler:", e);
        showToast("Erro a ler: " + (e && e.message ? e.message : "verifica a ligação"));
      }
    }
  }

  function getEntries(worker, date){
    var ym = ymKey(date), dk = dayKeyOf(date);
    var m = cache[ym]; if(!m) return [];
    var w = m[worker]; if(!w) return [];
    var arr = w[dk]; return Array.isArray(arr) ? arr : [];
  }

  async function persistMonth(ym){
    if(!sbReady){ showToast(isFileProtocol ? "Abre pelo link publicado — ficheiro local não guarda" : "Supabase não configurado — não guardado"); return; }
    try{
      var res = await sb.from("presencas").upsert({key:ym, data:cache[ym], updated_at:new Date().toISOString()});
      if(res.error) throw res.error;
      showToast("Guardado ✓");
    }catch(e){
      console.error("Erro ao guardar:", e);
      showToast("Erro ao guardar: " + (e && e.message ? e.message : "tenta novamente"));
    }
  }

  function setEntriesAndQueueSave(worker, date, arr){
    var ym = ymKey(date), dk = dayKeyOf(date);
    if(!cache[ym]) cache[ym] = {};
    if(!cache[ym][worker]) cache[ym][worker] = {};
    if(arr.length === 0) delete cache[ym][worker][dk];
    else cache[ym][worker][dk] = arr;
    return ym;
  }

  // ---------- validação de conflitos ----------
  function canSet(entries, targetObra, newStatus){
    var others = entries.filter(function(e){ return e.obra !== targetObra; });
    if(others.length === 0) return {ok:true};
    var blocker = others.filter(function(e){ return blockingStatus(e.status); })[0];
    if(blocker){
      return {ok:false, reason:"já tem "+STATUS[blocker.status].label+(blocker.obra?" em "+blocker.obra:"")+" nesse dia"};
    }
    if(blockingStatus(newStatus)){
      return {ok:false, reason:"já tem 1/2 dia marcado em "+others[0].obra+" — não pode juntar com "+STATUS[newStatus].label};
    }
    if(others.length >= 2) return {ok:false, reason:"já tem 2 meios-dias marcados nesse dia"};
    return {ok:true};
  }

  // ---------- render principal ----------
  function legendHtml(){
    return '<div class="legend">' + STATUS_ORDER.map(function(k){
      return '<span><i style="background:var('+STATUS_COLOR_VAR[k]+')"></i>'+STATUS[k].label+'</span>';
    }).join("") + '</div>';
  }

  function cellInnerHtml(entries){
    if(entries.length === 0) return '<div class="cell-half empty">·</div>';
    if(entries.length === 1){
      var e = entries[0];
      return '<div class="cell-half '+STATUS[e.status].cls+'">'+(e.obra||"—")+'</div>';
    }
    return entries.slice(0,2).map(function(e){
      return '<div class="cell-half '+STATUS[e.status].cls+'">'+(e.obra||"—")+'</div>';
    }).join("");
  }

  function buildUnifiedTable(dates, fill){
    var cls = "grid" + (periodMode === "week" ? " week" : "") + (fill ? " fill" : "");
    var h = '<table class="'+cls+'"><thead><tr><th class="worker-col">Trabalhador</th>';
    dates.forEach(function(d){
      h += '<th class="daycol'+(isWeekend(d)?" weekend":"")+'">'+d.getDate()+'<span class="dow">'+DOW[d.getDay()]+'</span></th>';
    });
    h += '</tr></thead><tbody>';
    WORKERS.forEach(function(w){
      h += '<tr><td class="worker-col">'+w+'</td>';
      dates.forEach(function(d){
        var entries = getEntries(w, d);
        var conflict = entries.length > 1 && entries.some(function(e){return blockingStatus(e.status);});
        h += '<td class="daycell'+(isWeekend(d)?" weekend":"")+'">'+
             '<button class="cell-btn'+(conflict?" conflict":"")+'" data-worker="'+w+'" data-date="'+d.toISOString()+'">'+
             cellInnerHtml(entries)+'</button></td>';
      });
      h += '</tr>';
    });
    h += '</tbody></table>';
    return h;
  }

  function attachCellHandlers(){
    document.querySelectorAll('.cell-btn').forEach(function(btn){
      btn.onclick = function(){
        var worker = btn.getAttribute('data-worker');
        var date = new Date(btn.getAttribute('data-date'));
        openSheet(worker, date);
      };
    });
  }

  function renderWorkerCards(dates){
    var el = document.getElementById("workerCards");
    el.innerHTML = WORKERS.map(function(w){
      var c = emptyCounts();
      dates.forEach(function(d){ getEntries(w,d).forEach(function(e){ if(c[e.status]!==undefined) c[e.status]++; }); });
      var total = c["1DIA"] + c["MEIODIA"]*0.5 + c["EXTRA"];
      return '<div class="scard"><div class="name">'+w+'</div>'+
        '<div class="row"><span>1 dia</span><b>'+c["1DIA"]+'</b></div>'+
        '<div class="row"><span>1/2 dia</span><b>'+c["MEIODIA"]+'</b></div>'+
        '<div class="row"><span>Faltas</span><b>'+c["FALTA"]+'</b></div>'+
        '<div class="row"><span>Férias</span><b>'+c["FERIAS"]+'</b></div>'+
        '<div class="row"><span>Dias extra</span><b>'+c["EXTRA"]+'</b></div>'+
        '<div class="row tot"><span>Total dias</span><b>'+total+'</b></div></div>';
    }).join("");
  }

  function renderObraCards(dates){
    var el = document.getElementById("obraCards");
    el.innerHTML = OBRAS.map(function(o){
      var perWorker = {};
      var totalObra = 0;
      WORKERS.forEach(function(w){
        var t = 0;
        dates.forEach(function(d){
          getEntries(w,d).forEach(function(e){
            if(e.obra !== o.code) return;
            if(e.status==="1DIA") t += 1;
            else if(e.status==="MEIODIA") t += 0.5;
            else if(e.status==="EXTRA") t += 1;
          });
        });
        if(t>0){ perWorker[w]=t; totalObra += t; }
      });
      var rows = Object.keys(perWorker).sort(function(a,b){return perWorker[b]-perWorker[a];})
        .map(function(w){ return '<div class="row"><span>'+w+'</span><b>'+perWorker[w]+'</b></div>'; }).join("");
      return '<div class="scard"><div class="name">'+o.code+'<div class="sub">'+o.name+'</div></div>'+
        (rows ? '<div class="breakdown">'+rows+'</div>' : '<div class="empty-hint">sem dias registados</div>')+
        '<div class="row tot"><span>Total dias</span><b>'+totalObra+'</b></div></div>';
    }).join("");
  }

  async function render(){
    var dates = currentDates();
    await ensureMonthsLoaded(dates);

    document.getElementById("modeMonth").className = periodMode==="month" ? "active" : "";
    document.getElementById("modeWeek").className = periodMode==="week" ? "active" : "";
    document.getElementById("periodLabel").textContent = periodLabel();

    var oldWrap = document.getElementById("gridWrap");
    var savedLeft = oldWrap ? oldWrap.scrollLeft : 0;
    var savedTop = oldWrap ? oldWrap.scrollTop : 0;
    var savedPageY = window.scrollY;

    var content = document.getElementById("content");
    content.innerHTML = legendHtml() +
      '<div class="grid-wrap" id="gridWrap"></div>' +
      '<div class="summary-wrap"><h3>Totais por trabalhador</h3><div class="summary-cards" id="workerCards"></div></div>' +
      '<div class="summary-wrap"><h3>Totais por obra</h3><div class="summary-cards" id="obraCards"></div></div>';

    var newWrap = document.getElementById("gridWrap");
    var workerColW = 104;
    var minDayColW = 40; // mínimo tocável razoável por coluna de dia
    var available = newWrap.clientWidth || window.innerWidth;
    var fill = available >= (workerColW + dates.length * minDayColW);
    newWrap.innerHTML = buildUnifiedTable(dates, fill);
    attachCellHandlers();
    renderWorkerCards(dates);
    renderObraCards(dates);

    newWrap.scrollLeft = savedLeft;
    newWrap.scrollTop = savedTop;
    window.scrollTo(0, savedPageY);
  }

  // ---------- painel (bottom sheet) ----------
  function renderObraPills(){
    var el = document.getElementById("obraPills");
    el.innerHTML = OBRAS.map(function(o){
      return '<button type="button" class="obra-pill'+(pendingObra===o.code?" selected":"")+'" data-code="'+o.code+'">'+o.code+'</button>';
    }).join("");
    el.querySelectorAll(".obra-pill").forEach(function(b){
      b.onclick = function(){
        var code = b.getAttribute("data-code");
        pendingObra = (pendingObra===code) ? null : code;
        renderObraPills();
        clearWarn();
      };
    });
  }

  function renderEntriesList(){
    var entries = getEntries(pendingWorker, pendingDate);
    var el = document.getElementById("entriesList");
    if(entries.length===0){
      el.innerHTML = '<div class="no-entries">Ainda sem marcação neste dia.</div>';
      return;
    }
    el.innerHTML = entries.map(function(e,idx){
      return '<div class="entry-row"><span><span class="tag" style="background:var('+STATUS_COLOR_VAR[e.status]+')"></span>'+
        (e.obra||"Sem obra")+' — '+STATUS[e.status].label+'</span>'+
        '<button class="rm" data-idx="'+idx+'">✕</button></div>';
    }).join("");
    el.querySelectorAll(".rm").forEach(function(b){
      b.onclick = async function(){
        var idx = parseInt(b.getAttribute("data-idx"),10);
        var arr = getEntries(pendingWorker, pendingDate).slice();
        arr.splice(idx,1);
        var ym = setEntriesAndQueueSave(pendingWorker, pendingDate, arr);
        await persistMonth(ym);
        renderEntriesList();
        render();
      };
    });
  }

  function clearWarn(){ var w=document.getElementById("sheetWarn"); w.classList.remove("show"); w.textContent=""; }
  function showWarn(msg){ var w=document.getElementById("sheetWarn"); w.textContent=msg; w.classList.add("show"); }

  function openSheet(worker, date){
    pendingWorker = worker; pendingDate = date;
    document.getElementById("sheetWho").textContent = worker;
    document.getElementById("sheetWhen").textContent = date.getDate()+" de "+MONTH_NAMES[date.getMonth()];
    pendingObra = (lastObra && OBRAS.some(function(o){return o.code===lastObra;})) ? lastObra : null;
    renderObraPills();
    renderEntriesList();
    clearWarn();
    document.getElementById("overlay").classList.add("open");
  }
  function closeSheet(){
    document.getElementById("overlay").classList.remove("open");
    pendingWorker = null; pendingDate = null; pendingObra = null;
  }

  async function attemptSetStatus(statusKey){
    if(!pendingWorker || !pendingDate) return;
    var needsObra = (statusKey==="1DIA" || statusKey==="MEIODIA" || statusKey==="EXTRA");
    if(needsObra && !pendingObra){
      showWarn("Escolhe primeiro a obra.");
      return;
    }
    var entries = getEntries(pendingWorker, pendingDate);
    var check = canSet(entries, pendingObra, statusKey);
    if(!check.ok){ showWarn("Não é possível: " + check.reason + "."); return; }

    var others = entries.filter(function(e){ return e.obra !== pendingObra; });
    var newArr = others.concat([{obra:pendingObra, status:statusKey}]);
    var ym = setEntriesAndQueueSave(pendingWorker, pendingDate, newArr);
    if(pendingObra) setLastObra(pendingObra);
    clearWarn();
    await persistMonth(ym);
    closeSheet();
    render();
  }

  // ---------- gestão de obras/trabalhadores ----------
  function renderManageLists(){
    var ol = document.getElementById("obraList");
    ol.innerHTML = OBRAS.map(function(o){
      return '<div class="manage-item"><span>'+o.code+' — '+o.name+'</span><button class="rm" data-code="'+o.code+'">✕</button></div>';
    }).join("");
    ol.querySelectorAll(".rm").forEach(function(b){ b.onclick=function(){ removeObra(b.getAttribute("data-code")); }; });

    var wl = document.getElementById("workerList");
    wl.innerHTML = WORKERS.map(function(w){
      return '<div class="manage-item"><span>'+w+'</span><button class="rm" data-name="'+w+'">✕</button></div>';
    }).join("");
    wl.querySelectorAll(".rm").forEach(function(b){ b.onclick=function(){ removeWorker(b.getAttribute("data-name")); }; });
  }
  async function removeObra(code){
    OBRAS = OBRAS.filter(function(o){ return o.code!==code; });
    await saveConfig(); renderManageLists(); render();
  }
  async function removeWorker(name){
    WORKERS = WORKERS.filter(function(w){ return w!==name; });
    await saveConfig(); renderManageLists(); render();
  }

  document.getElementById("manageBtn").onclick = function(){
    renderManageLists();
    document.getElementById("manageOverlay").classList.add("open");
  };
  document.getElementById("closeManageBtn").onclick = function(){
    document.getElementById("manageOverlay").classList.remove("open");
  };
  document.getElementById("manageOverlay").onclick = function(e){
    if(e.target.id==="manageOverlay") document.getElementById("manageOverlay").classList.remove("open");
  };
  document.getElementById("addObraBtn").onclick = async function(){
    var code = document.getElementById("newObraCode").value.trim();
    var name = document.getElementById("newObraName").value.trim();
    if(!code || !name){ showToast("Preenche código e nome"); return; }
    if(OBRAS.some(function(o){return o.code===code;})){ showToast("Já existe uma obra com esse código"); return; }
    OBRAS.push({code:code, name:name});
    document.getElementById("newObraCode").value = "";
    document.getElementById("newObraName").value = "";
    await saveConfig(); renderManageLists(); render();
  };
  document.getElementById("addWorkerBtn").onclick = async function(){
    var name = document.getElementById("newWorkerName").value.trim().toUpperCase();
    if(!name){ showToast("Escreve um nome"); return; }
    if(WORKERS.indexOf(name)!==-1){ showToast("Esse trabalhador já existe"); return; }
    WORKERS.push(name);
    document.getElementById("newWorkerName").value = "";
    await saveConfig(); renderManageLists(); render();
  };

  // ---------- ligações gerais ----------
  document.getElementById("overlay").onclick = function(e){ if(e.target.id==="overlay") closeSheet(); };
  document.getElementById("closeSheetBtn").onclick = closeSheet;
  document.querySelectorAll(".opt").forEach(function(b){
    b.onclick = function(){ attemptSetStatus(b.getAttribute("data-k")); };
  });

  document.getElementById("modeMonth").onclick = function(){ periodMode="month"; render(); };
  document.getElementById("modeWeek").onclick = function(){ periodMode="week"; render(); };
  document.getElementById("prevBtn").onclick = function(){
    anchorDate = periodMode==="month" ? new Date(anchorDate.getFullYear(), anchorDate.getMonth()-1, 1) : addDays(anchorDate,-7);
    render();
  };
  document.getElementById("nextBtn").onclick = function(){
    anchorDate = periodMode==="month" ? new Date(anchorDate.getFullYear(), anchorDate.getMonth()+1, 1) : addDays(anchorDate,7);
    render();
  };

  // ---------- exportar para excel ----------
  document.getElementById("exportBtn").onclick = async function(){
    var btn = document.getElementById("exportBtn");
    btn.disabled = true; btn.textContent = "A gerar…";
    try{
      var dates = currentDates();
      await ensureMonthsLoaded(dates);
      var wb = XLSX.utils.book_new();

      var detRows = [["Trabalhador"].concat(dates.map(function(d){ return d.getDate()+"/"+(d.getMonth()+1); }))];
      WORKERS.forEach(function(w){
        var row = [w];
        dates.forEach(function(d){
          var entries = getEntries(w,d);
          row.push(entries.map(function(e){ return (e.obra||"—")+": "+STATUS[e.status].label; }).join(" | "));
        });
        detRows.push(row);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(detRows), "Detalhe");

      var wRows = [["Trabalhador","Dias Completos","1/2 Dias","Faltas","Férias","Dias Extra","Total Dias"]];
      WORKERS.forEach(function(w){
        var c = emptyCounts();
        dates.forEach(function(d){ getEntries(w,d).forEach(function(e){ if(c[e.status]!==undefined) c[e.status]++; }); });
        wRows.push([w, c["1DIA"], c["MEIODIA"], c["FALTA"], c["FERIAS"], c["EXTRA"], c["1DIA"]+c["MEIODIA"]*0.5+c["EXTRA"]]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wRows), "Resumo por Trabalhador");

      var oRows = [["Obra","Nome"].concat(WORKERS).concat(["Total"])];
      OBRAS.forEach(function(o){
        var row = [o.code, o.name];
        var tot = 0;
        WORKERS.forEach(function(w){
          var t = 0;
          dates.forEach(function(d){
            getEntries(w,d).forEach(function(e){
              if(e.obra!==o.code) return;
              if(e.status==="1DIA") t+=1; else if(e.status==="MEIODIA") t+=0.5; else if(e.status==="EXTRA") t+=1;
            });
          });
          row.push(t); tot += t;
        });
        row.push(tot);
        oRows.push(row);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(oRows), "Resumo por Obra");

      XLSX.writeFile(wb, "Alocacao_Trabalhadores_"+ymKey(dates[0])+".xlsx");
    } catch(e){
      console.error(e);
      showToast("Erro ao exportar");
    } finally {
      btn.disabled = false; btn.textContent = "Exportar para Excel";
    }
  };

  // ---------- arranque ----------
  var resizeTimer = null;
  var lastWidth = window.innerWidth;
  function onResize(){
    var w = window.innerWidth;
    if(w === lastWidth) return; // altura mudou só (barra de endereço a esconder/mostrar ao fazer scroll) — ignora
    lastWidth = w;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){ render(); }, 180);
  }
  window.addEventListener("resize", onResize);
  window.addEventListener("orientationchange", onResize);

  (async function init(){
    if(sbReady) await loadConfig();
    await render();
  })();
})();
</script>
</body>
</html>
